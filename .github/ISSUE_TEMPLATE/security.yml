name: Security Issue
description: Report a security concern or vulnerability
labels: ['security']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the security concern.
    validations:
      required: true
  - type: dropdown
    id: affected-component
    attributes:
      label: Affected component
      description: Which part of the action is affected?
      options:
        - commits
        - version
        - github
        - templates
        - utils
        - dependencies
        - CI/CD pipeline
        - other
    validations:
      required: true
  - type: textarea
    id: severity-assessment
    attributes:
      label: Severity assessment
      description: How severe is this issue? What is the potential impact?
    validations:
      required: true
  - type: textarea
    id: suggested-fix
    attributes:
      label: Suggested fix
      description: How should this be addressed?
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
