name: Test

on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number for concurrency grouping
        required: false
        type: string
      head_sha:
        description: PR head SHA to validate
        required: true
        type: string

permissions:
  checks: write
  contents: read

concurrency:
  group: test-${{ github.event.pull_request.number || inputs.pr_number || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      HEAD_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || github.event.pull_request.head.sha }}

    steps:
      - name: Create in-progress check run
        if: github.event_name == 'workflow_dispatch'
        id: create-check
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Test',
              head_sha: '${{ inputs.head_sha }}',
              status: 'in_progress',
              started_at: new Date().toISOString(),
            });
            core.setOutput('check_run_id', data.id);

      - uses: actions/checkout@v6
        with:
          ref: ${{ env.HEAD_SHA }}

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm -s tsc --noEmit

      - name: Lint
        run: pnpm eslint . --max-warnings 0 --no-warn-ignored

      - name: Prettier check
        run: pnpm prettier --check .

      - name: Run tests
        run: pnpm test

      - name: Complete check run
        if: always() && github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: ${{ steps.create-check.outputs.check_run_id }},
              status: 'completed',
              conclusion: '${{ job.status }}',
              completed_at: new Date().toISOString(),
            });
